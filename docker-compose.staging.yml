services:
  backend:
    image: ghcr.io/pepeluimoreno/siga-backend:latest
    networks:
      - internal
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.${APP_PREFIX}-api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.${APP_PREFIX}-api.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX}-api.tls=true"
      - "traefik.http.routers.${APP_PREFIX}-api.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.routers.${APP_PREFIX}-api.middlewares=${APP_PREFIX}-stripapi"
      - "traefik.http.middlewares.${APP_PREFIX}-stripapi.stripprefix.prefixes=/api"
      - "traefik.http.services.${APP_PREFIX}-api.loadbalancer.server.port=8000"

  frontend:
    image: ghcr.io/pepeluimoreno/siga-frontend:latest
    networks:
      - internal
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      - "traefik.http.routers.${APP_PREFIX}-web.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.${APP_PREFIX}-web.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX}-web.tls=true"
      - "traefik.http.routers.${APP_PREFIX}-web.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}"
      - "traefik.http.services.${APP_PREFIX}-web.loadbalancer.server.port=80"

networks:
  traefik_public:
    external: true
