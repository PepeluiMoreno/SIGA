name: Deploy SIGA

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Desplegar a PRODUCCIÓN (VPS1)"
        type: boolean
        default: false

# Serializa los despliegues: nunca dos a la vez sobre el mismo entorno.
concurrency:
  group: deploy-siga
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/pepeluimoreno/siga

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Etiqueta semántica (solo en tags v*)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "semver=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ steps.meta.outputs.semver && format('{0}-backend:{1}', env.IMAGE_PREFIX, steps.meta.outputs.semver) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-backend:latest
          cache-to: type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ steps.meta.outputs.semver && format('{0}-frontend:{1}', env.IMAGE_PREFIX, steps.meta.outputs.semver) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-to: type=inline

  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && !(github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copiar compose + scripts (scp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.yml,docker-compose.prod.yml,scripts/"
          target: /opt/docker/apps/SIGA/
          overwrite: true
      - name: Desplegar (SSH)
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
          ENV_STAGING: ${{ secrets.SIGA_ENV_STAGING }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST_STAGING }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_IMAGE_TAG,ENV_STAGING,GHCR_PAT
          script: |
            cd /opt/docker/apps/SIGA
            umask 077
            printf '%s\n' "$ENV_STAGING" > .env.production
            export DEPLOY_IMAGE_TAG GHCR_PAT
            ./scripts/deploy-remote-pull.sh

  deploy-production:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copiar compose + scripts (scp)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "docker-compose.yml,docker-compose.prod.yml,scripts/"
          target: /opt/docker/apps/SIGA/
          overwrite: true
      - name: Desplegar (SSH)
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: DEPLOY_IMAGE_TAG,ENV_PRODUCTION,GHCR_PAT
          script: |
            cd /opt/docker/apps/SIGA
            umask 077
            printf '%s\n' "$ENV_PRODUCTION" > .env.production
            export DEPLOY_IMAGE_TAG GHCR_PAT
            ./scripts/deploy-remote-pull.sh
