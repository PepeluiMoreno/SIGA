name: Deploy SIGA

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      deploy_production:
        description: "Desplegar a PRODUCCIÓN (VPS1)"
        type: boolean
        default: false

# Serializa los despliegues: nunca dos a la vez sobre el mismo entorno.
concurrency:
  group: deploy-siga
  cancel-in-progress: false

env:
  IMAGE_PREFIX: ghcr.io/pepeluimoreno/siga

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Etiqueta semántica (solo en tags v*)
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "semver=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ steps.meta.outputs.semver && format('{0}-backend:{1}', env.IMAGE_PREFIX, steps.meta.outputs.semver) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-backend:latest
          cache-to: type=inline

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ steps.meta.outputs.semver && format('{0}-frontend:{1}', env.IMAGE_PREFIX, steps.meta.outputs.semver) || '' }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-to: type=inline

  # El deploy corre en un runner SELF-HOSTED instalado en el propio VPS.
  # El runner self-hosted solo abre conexiones SALIENTES a GitHub (no expone
  # ningún puerto entrante) y ejecuta el despliegue localmente, junto a Docker,
  # sin depender de SSH/scp entrante hacia el VPS.
  #
  # Requisitos de registro del runner (ver scripts no incluidos):
  #   - STAGING (VPS2):     labels  self-hosted, siga-staging
  #   - PRODUCCIÓN (VPS1):  labels  self-hosted, siga-production
  #   - el usuario del runner debe estar en el grupo 'docker' y tener permiso de
  #     escritura sobre /opt/docker/apps/SIGA
  deploy-staging:
    needs: build-and-push
    if: github.ref == 'refs/heads/master' && !(github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: [self-hosted, siga-staging]
    env:
      DEPLOY_DIR: /opt/docker/apps/SIGA
    steps:
      - uses: actions/checkout@v4
      - name: Desplegar (local en el VPS)
        env:
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
          ENV_STAGING: ${{ secrets.SIGA_ENV_STAGING }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR/scripts"
          cp -f docker-compose.yml docker-compose.prod.yml "$DEPLOY_DIR"/
          cp -f scripts/*.sh "$DEPLOY_DIR/scripts"/
          cd "$DEPLOY_DIR"
          umask 077
          printf '%s\n' "$ENV_STAGING" > .env.production
          export DEPLOY_IMAGE_TAG GHCR_PAT
          ./scripts/deploy-remote-pull.sh

  deploy-production:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.deploy_production)
    runs-on: [self-hosted, siga-production]
    env:
      DEPLOY_DIR: /opt/docker/apps/SIGA
    steps:
      - uses: actions/checkout@v4
      - name: Desplegar (local en el VPS)
        env:
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
        run: |
          set -euo pipefail
          mkdir -p "$DEPLOY_DIR/scripts"
          cp -f docker-compose.yml docker-compose.prod.yml "$DEPLOY_DIR"/
          cp -f scripts/*.sh "$DEPLOY_DIR/scripts"/
          cd "$DEPLOY_DIR"
          umask 077
          printf '%s\n' "$ENV_PRODUCTION" > .env.production
          export DEPLOY_IMAGE_TAG GHCR_PAT
          ./scripts/deploy-remote-pull.sh
