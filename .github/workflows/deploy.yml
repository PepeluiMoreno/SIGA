name: Deploy SIGA

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_PREFIX: ghcr.io/pepeluimoreno/siga
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:latest
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-backend:latest
          cache-to: type=inline

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:latest
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.IMAGE_PREFIX }}-frontend:latest
          cache-to: type=inline

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      SIGA_ENV_STAGING: ${{ secrets.SIGA_ENV_STAGING }}
    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          envs: SIGA_ENV_STAGING
          script: |
            cd /opt/docker/apps/SIGA
            git pull
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            umask 077
            printf '%s\n' "$SIGA_ENV_STAGING" > .env.staging
            docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml pull
            docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml up -d --remove-orphans
            docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml ps
            docker image prune -f
