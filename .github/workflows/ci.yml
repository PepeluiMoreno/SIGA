name: CI - Validate

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feature/**
      - fix/**

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    env:
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: siga_test
      DB_USER: siga
      DB_PASSWORD: siga
      JWT_SECRET: ci-test-secret-key

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Check syntax (ast parse)
        run: |
          cd backend
          uv run python -c "
          import ast, sys, pathlib
          errores = []
          for f in pathlib.Path('app/domains/financiero').rglob('*.py'):
              try:
                  ast.parse(f.read_text())
              except SyntaxError as e:
                  errores.append(f'{f}: {e}')
          if errores:
              print('ERRORES DE SINTAXIS:')
              for e in errores: print(e)
              sys.exit(1)
          print(f'OK: sintaxis correcta en {len(list(pathlib.Path(\"app/domains/financiero\").rglob(\"*.py\")))} archivos')
          "

      - name: Lint (ruff)
        run: |
          cd backend
          uv run ruff check app/domains/financiero/ --select E,F,W --ignore E501 || true

      - name: Run tests
        run: |
          cd backend
          uv run python -m pytest app/tests/ -v --tb=short -q 2>/dev/null || echo 'No tests found yet'

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint 2>/dev/null || echo 'No lint script found'

      - name: Build
        run: |
          cd frontend
          npm run build
