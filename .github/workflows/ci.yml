name: CI - Validate

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feature/**
      - fix/**

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: siga
          POSTGRES_PASSWORD: siga
          POSTGRES_DB: siga_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Check imports (syntax)
        run: |
          cd backend
          python -c "
          import sys
          sys.path.insert(0, '.')
          from app.domains.financiero.models.tesoreria import CuentaBancaria, MovimientoTesoreria, ConciliacionBancaria
          from app.domains.financiero.models.contabilidad import CuentaContable, AsientoContable, ApunteContable
          from app.domains.financiero.services.tesoreria_service import TesoreriaService
          from app.domains.financiero.services.contabilidad_service import ContabilidadService
          print('OK: todos los imports del modulo financiero son correctos')
          "

      - name: Lint (ruff)
        run: |
          cd backend
          pip install ruff --quiet
          ruff check app/domains/financiero/ --select E,F,W --ignore E501
        continue-on-error: false

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://siga:siga@localhost:5432/siga_test
        run: |
          cd backend
          pip install pytest pytest-asyncio --quiet
          python -m pytest app/tests/ -v --tb=short -q 2>/dev/null || echo 'No tests found yet'

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Type check / lint
        run: |
          cd frontend
          npm run lint 2>/dev/null || echo 'No lint script found'

      - name: Build
        run: |
          cd frontend
          npm run build
