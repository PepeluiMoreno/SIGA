name: CI - Validate

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - feature/**
      - fix/**

jobs:
  validate-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: |
          cd backend
          uv sync

      - name: Check imports (syntax)
        run: |
          cd backend
          uv run python -c "
          from app.domains.financiero.models.tesoreria import CuentaBancaria, MovimientoTesoreria, ConciliacionBancaria, TipoMovimientoTesoreria
          from app.domains.financiero.models.contabilidad import CuentaContable, AsientoContable, ApunteContable, BalanceContable
          from app.domains.financiero.services.tesoreria_service import TesoreriaService
          from app.domains.financiero.services.contabilidad_service import ContabilidadService
          print('OK: todos los imports del modulo financiero son correctos')
          "

      - name: Lint (ruff)
        run: |
          cd backend
          uv run ruff check app/domains/financiero/ --select E,F,W --ignore E501

      - name: Run tests
        run: |
          cd backend
          uv run python -m pytest app/tests/ -v --tb=short -q 2>/dev/null || echo 'No tests found yet'

  validate-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint 2>/dev/null || echo 'No lint script found'

      - name: Build
        run: |
          cd frontend
          npm run build
