name: Seed demo Europa Laica (staging, one-shot)
on:
  workflow_dispatch:
jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/docker/apps/SIGA
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            echo "=== Ejecutar seed_demo_europalaica ==="
            docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml \
              run --rm --no-deps backend python -m app.scripts.seeding.seed_demo_europalaica 2>&1 | grep -E "demo\]|Error|error" | tail -20
            echo ""
            echo "=== Conteos ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT 'unidades='||count(*) FROM unidades_organizativas; SELECT 'miembros='||count(*) FROM miembros; SELECT 'juntas='||count(*) FROM juntas_directivas; SELECT 'nombramientos_activos='||count(*) FROM historial_nombramientos WHERE estado='ACTIVO'; SELECT 'provincias='||count(*) FROM provincias;"
