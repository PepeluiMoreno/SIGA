name: Diagnose staging (one-shot)
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)
            echo "=== backend logs (last 120) ==="
            docker logs --tail 120 "$BE_CONT" 2>&1
