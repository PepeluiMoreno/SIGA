name: Restart staging and read logs
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/docker/apps/SIGA
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            echo "=== alembic actual ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"
            echo "=== Restart backend ==="
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)
            docker restart "$BE_CONT"
            sleep 20
            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "=== alembic tras intento ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"
            echo ""
            echo "=== logs (últimas 80) — buscar error de migración concreto ==="
            docker logs --tail 80 "$BE_CONT" 2>&1 | tail -80
