# Diagnóstico puntual de staging. Borrar tras usar.
name: Diagnose staging (one-shot)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/docker/apps/SIGA
            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Image}}\t{{.Status}}"
            echo ""
            echo "=== backend logs (last 80) ==="
            docker logs --tail 80 $(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1) 2>&1 || true
            echo ""
            echo "=== usuarios admin ==="
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            docker exec "$DB_CONT" psql -U siga -d siga -c "
              SELECT u.email, u.activo,
                EXISTS(SELECT 1 FROM usuarios_roles ur
                       JOIN roles r ON r.id=ur.rol_id
                       WHERE ur.usuario_id=u.id AND r.codigo='SUPERADMIN'
                       AND ur.eliminado=FALSE) AS superadmin
              FROM usuarios u
              WHERE u.email IN ('admin@siga.local', 'joseluis.morgomez@gmail.com');
            " 2>&1 || echo "(no se pudo consultar BD)"
