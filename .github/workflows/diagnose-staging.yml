name: Apply manual SQL + stamp head + restart
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)

            # Volcamos el SQL a /tmp y lo aplicamos vía psql -f
            cat > /tmp/staging_fix.sql <<'EOSQL'
            CREATE TABLE IF NOT EXISTS sec_plataformas_telematicas (
              id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
              codigo VARCHAR(40) UNIQUE NOT NULL,
              nombre VARCHAR(100) NOT NULL,
              descripcion TEXT,
              icono VARCHAR(100),
              activa BOOLEAN NOT NULL DEFAULT TRUE,
              orden INTEGER NOT NULL DEFAULT 0,
              url_base VARCHAR(300),
              campos_esquema TEXT,
              es_inmutable BOOLEAN NOT NULL DEFAULT FALSE,
              fecha_creacion TIMESTAMP NOT NULL DEFAULT now(),
              fecha_modificacion TIMESTAMP,
              fecha_eliminacion TIMESTAMP,
              eliminado BOOLEAN NOT NULL DEFAULT FALSE,
              creado_por_id UUID REFERENCES usuarios(id),
              modificado_por_id UUID REFERENCES usuarios(id)
            );
            CREATE INDEX IF NOT EXISTS ix_sec_plat_telem_codigo ON sec_plataformas_telematicas(codigo);
            CREATE INDEX IF NOT EXISTS ix_sec_plat_telem_activa ON sec_plataformas_telematicas(activa);
            ALTER TABLE sec_reuniones ADD COLUMN IF NOT EXISTS plataforma_telematica_id UUID REFERENCES sec_plataformas_telematicas(id) ON DELETE SET NULL;
            ALTER TABLE sec_reuniones ADD COLUMN IF NOT EXISTS datos_conexion_telematica TEXT;
            CREATE INDEX IF NOT EXISTS ix_sec_reuniones_plat_telem ON sec_reuniones(plataforma_telematica_id);
            INSERT INTO sec_plataformas_telematicas (id, codigo, nombre, descripcion, icono, orden, url_base, campos_esquema, es_inmutable) VALUES
              (gen_random_uuid(), 'JITSI', 'Jitsi Meet', 'Servidor de videoconferencia abierto y autoalojable.', '📹', 10, 'https://meet.jit.si/',
               '[{"key":"sala","label":"Nombre de la sala","tipo":"text","requerido":true,"placeholder":"asamblea-2026"},{"key":"url","label":"URL completa","tipo":"url","requerido":false,"placeholder":"https://meet.jit.si/asamblea-2026"},{"key":"password","label":"Contraseña","tipo":"text","requerido":false}]',
               TRUE),
              (gen_random_uuid(), 'ZOOM', 'Zoom', 'Plataforma comercial de videoconferencia.', '🟦', 20, 'https://zoom.us/j/',
               '[{"key":"url","label":"URL de la reunión","tipo":"url","requerido":true},{"key":"id_reunion","label":"ID de reunión","tipo":"text","requerido":false},{"key":"password","label":"Contraseña","tipo":"text","requerido":false}]',
               TRUE),
              (gen_random_uuid(), 'MEET', 'Google Meet', 'Videoconferencia de Google Workspace.', '🟢', 30, 'https://meet.google.com/',
               '[{"key":"url","label":"URL de la reunión","tipo":"url","requerido":true,"placeholder":"https://meet.google.com/xxx-xxxx-xxx"}]',
               TRUE),
              (gen_random_uuid(), 'TEAMS', 'Microsoft Teams', 'Videoconferencia de Microsoft 365.', '🟪', 40, 'https://teams.microsoft.com/',
               '[{"key":"url","label":"URL de la reunión","tipo":"url","requerido":true},{"key":"id_reunion","label":"ID de reunión","tipo":"text","requerido":false},{"key":"password","label":"Contraseña","tipo":"text","requerido":false}]',
               TRUE),
              (gen_random_uuid(), 'INDICO', 'Indico', 'Plataforma de eventos académicos / activismo (CERN).', '🎯', 50, NULL,
               '[{"key":"url","label":"URL del evento Indico","tipo":"url","requerido":true},{"key":"sala","label":"ID del evento","tipo":"text","requerido":false}]',
               TRUE),
              (gen_random_uuid(), 'OTRA', 'Otra plataforma', 'Plataforma personalizada — usa URL y notas libres.', '🔗', 99, NULL,
               '[{"key":"url","label":"URL de la reunión","tipo":"url","requerido":true},{"key":"nombre_plataforma","label":"Nombre de la plataforma","tipo":"text","requerido":false},{"key":"notas","label":"Notas de conexión","tipo":"text","requerido":false}]',
               FALSE)
            ON CONFLICT (codigo) DO NOTHING;
            ALTER TABLE actividades ADD COLUMN IF NOT EXISTS plataforma_telematica_id UUID REFERENCES sec_plataformas_telematicas(id) ON DELETE SET NULL;
            ALTER TABLE actividades ADD COLUMN IF NOT EXISTS datos_conexion_telematica TEXT;
            CREATE INDEX IF NOT EXISTS ix_actividades_plat_telem ON actividades(plataforma_telematica_id);
            UPDATE alembic_version SET version_num='f3d4e5f6a7b8';
            EOSQL

            docker cp /tmp/staging_fix.sql "$DB_CONT":/tmp/staging_fix.sql
            echo "=== Aplicando SQL ==="
            docker exec "$DB_CONT" psql -U siga -d siga -v ON_ERROR_STOP=1 -f /tmp/staging_fix.sql

            echo ""
            echo "=== alembic tras stamp ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"

            echo "=== restart backend ==="
            docker restart "$BE_CONT"
            sleep 25

            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "=== logs (últimas 50) ==="
            docker logs --tail 50 "$BE_CONT" 2>&1 | tail -50
            echo ""
            echo "=== usuarios admin ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "SELECT u.email, u.activo, EXISTS(SELECT 1 FROM usuarios_roles ur JOIN roles r ON r.id=ur.rol_id WHERE ur.usuario_id=u.id AND r.codigo='SUPERADMIN' AND ur.eliminado=FALSE) AS superadmin FROM usuarios u WHERE u.email IN ('admin@siga.local', 'joseluis.morgomez@gmail.com');"
