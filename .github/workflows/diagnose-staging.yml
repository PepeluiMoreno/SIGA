# Diagnóstico puntual de staging. Borrar tras usar.
name: Diagnose staging (one-shot)

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/docker/apps/SIGA
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            echo "=== alembic_version ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version" 2>&1
            echo ""
            echo "=== tipos_meta_campania schema ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "\d tipos_meta_campania" 2>&1 | head -25
            echo ""
            echo "=== Migraciones disponibles (3 últimas) ==="
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)
            docker exec "$BE_CONT" sh -c "ls /app/alembic/versions | sort | tail -10" 2>&1 || echo "(backend caído, ls indirecto)"
            ls /opt/docker/apps/SIGA/backend/alembic/versions 2>/dev/null | sort | tail -10 || true
            echo ""
            echo "=== Buscar add_column tipos_meta_campania fecha_creacion ==="
            grep -rln "tipos_meta_campania" /opt/docker/apps/SIGA/backend/alembic/versions 2>/dev/null || true
