name: Deep diagnose staging
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            echo "=== alembic actual ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"
            echo ""
            echo "=== Existe sec_reuniones? ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='sec_reuniones')"
            echo "=== Existe sec_actas? ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='sec_actas')"
            echo "=== Existe rgpd_encargados_tratamiento? ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='rgpd_encargados_tratamiento')"
            echo "=== Existe sec_plataformas_telematicas? ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT EXISTS(SELECT 1 FROM information_schema.tables WHERE table_name='sec_plataformas_telematicas')"
            echo ""
            echo "=== Lista de tablas (top 60) ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT table_name FROM information_schema.tables WHERE table_schema='public' ORDER BY table_name" | head -60
            echo ""
            echo "=== Total tablas ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'"
