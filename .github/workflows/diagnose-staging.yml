# Diagnóstico puntual de staging. Borrar tras usar.
name: Diagnose staging (one-shot)
on:
  workflow_dispatch:
jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/docker/apps/SIGA
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)
            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "=== alembic head ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"
            echo ""
            echo "=== Últimas líneas del bootstrap ==="
            docker logs --tail 40 "$BE_CONT" 2>&1 | grep -E "bootstrap|ERROR|Application startup|alembic" | tail -25
            echo ""
            echo "=== usuarios admin ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "
              SELECT u.email, u.activo,
                EXISTS(SELECT 1 FROM usuarios_roles ur
                       JOIN roles r ON r.id=ur.rol_id
                       WHERE ur.usuario_id=u.id AND r.codigo='SUPERADMIN'
                       AND ur.eliminado=FALSE) AS superadmin
              FROM usuarios u
              WHERE u.email IN ('admin@siga.local', 'joseluis.morgomez@gmail.com');
            "
