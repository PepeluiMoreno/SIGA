name: Reset esquema staging (create_all)
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          command_timeout: 15m
          script: |
            cd /opt/docker/apps/SIGA
            DB_CONT=$(docker ps --filter "name=db" --format "{{.Names}}" | head -1)
            BE_CONT=$(docker ps -a --filter "name=backend" --format "{{.Names}}" | head -1)

            echo "=== git pull (trae sync_schema.py) ==="
            git pull --rebase

            echo "=== Parar backend ==="
            docker stop "$BE_CONT" || true

            echo "=== DROP + CREATE SCHEMA public (reset total) ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public; GRANT ALL ON SCHEMA public TO siga; GRANT ALL ON SCHEMA public TO public;"

            echo "=== create_all: crea TODO el esquema desde los modelos (BD vacía) ==="
            # Montamos el código del repo por si la imagen aún no trae sync_schema.py
            docker compose --env-file .env.staging -f docker-compose.yml -f docker-compose.staging.yml \
              run --rm --no-deps -v "$PWD/backend/app:/app/app" \
              backend python -m app.scripts.sync_schema

            echo "=== Fijar alembic_version a head ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "CREATE TABLE IF NOT EXISTS alembic_version (version_num VARCHAR(32) NOT NULL);"
            docker exec "$DB_CONT" psql -U siga -d siga -c "DELETE FROM alembic_version; INSERT INTO alembic_version (version_num) VALUES ('f3d4e5f6a7b8');"
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT version_num FROM alembic_version"

            echo "=== Arrancar backend (alembic no-op + bootstrap siembra catálogos+usuarios) ==="
            docker start "$BE_CONT"
            sleep 35

            echo "=== docker ps ==="
            docker ps --format "table {{.Names}}\t{{.Status}}"
            echo ""
            echo "=== logs (últimas 50) ==="
            docker logs --tail 50 "$BE_CONT" 2>&1 | tail -50
            echo ""
            echo "=== conteo tablas ==="
            docker exec "$DB_CONT" psql -U siga -d siga -tAc "SELECT count(*) FROM information_schema.tables WHERE table_schema='public'"
            echo "=== usuarios admin ==="
            docker exec "$DB_CONT" psql -U siga -d siga -c "SELECT u.email, u.activo, EXISTS(SELECT 1 FROM usuarios_roles ur JOIN roles r ON r.id=ur.rol_id WHERE ur.usuario_id=u.id AND r.codigo='SUPERADMIN' AND ur.eliminado=FALSE) AS superadmin FROM usuarios u WHERE u.email IN ('admin@siga.local', 'joseluis.morgomez@gmail.com');"
