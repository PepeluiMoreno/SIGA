services:
  backend:
    build: ./backend
    container_name: siga_dev_backend
    restart: unless-stopped
    volumes:
      - ./backend/app:/app/app           # hot-reload del código fuente
      - ./backend/main.py:/app/main.py
      - ./backend/alembic:/app/alembic
      - ./backend/initial_data:/app/initial_data  # datos semilla actualizados
      - uploads_dev:/app/uploads         # documentos subidos (persistentes)
    command: >
      sh -c "python -m app.scripts.wait_for_db &&
             alembic upgrade head &&
             python -m app.scripts.bootstrap &&
             exec uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      INITIAL_ADMIN_EMAIL: ${INITIAL_ADMIN_EMAIL:-}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  frontend:
    image: node:22-alpine
    build: !reset null            # en dev el front corre con Vite (node), NO se construye su imagen
    container_name: siga_dev_frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules  # node_modules aislados del host
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      - VITE_BACKEND_URL=http://backend:8000
      - VITE_HMR_CLIENT_PORT=443
    depends_on:
      - backend
    networks:
      - internal
      - traefik_public
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_public"
      # HTTP
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev.rule=Host(`${APP_DEV_DOMAIN:-siga.optiplex-790}`)"
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev.entrypoints=web"
      - "traefik.http.services.${APP_PREFIX:-siga}-dev.loadbalancer.server.port=3000"
      # HTTPS (cert auto-firmado de Traefik, sin Let's Encrypt)
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev-tls.rule=Host(`${APP_DEV_DOMAIN:-siga.optiplex-790}`)"
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev-tls.entrypoints=websecure"
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev-tls.tls=true"
      - "traefik.http.routers.${APP_PREFIX:-siga}-dev-tls.service=${APP_PREFIX:-siga}-dev"

  db:
    image: postgres:17-alpine
    container_name: siga_dev_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - internal

networks:
  internal:
  traefik_public:
    external: true

volumes:
  pgdata_dev:
  frontend_modules:
  uploads_dev:
