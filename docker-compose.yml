services:
  backend:
    build: ./backend
    image: ${APP_PREFIX:-siga}-backend-local:dev
    container_name: ${APP_PREFIX}_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD:-}
    volumes:
      - media_fotos:/app/media/fotos
      - ./01_europa_laica_com-2026_02_17.sql:/tmp/dump.sql:ro
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  frontend:
    build: ./frontend
    image: ${APP_PREFIX:-siga}-frontend-local:dev
    container_name: ${APP_PREFIX}_frontend
    restart: unless-stopped
    networks:
      - internal
    security_opt:
      - no-new-privileges:true

  db:
    image: postgres:17-alpine
    container_name: ${APP_PREFIX}_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - internal

networks:
  internal:

volumes:
  pgdata:
  media_fotos:
